<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Çin Batarya Pasaportu (Demo)</title>

  <style>
    :root{ --bg1:#0b1f4a; --bg2:#0b6b6b; --stroke:rgba(255,255,255,.10); --text:#eaf0ff; --muted:rgba(234,240,255,.75); }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; padding:24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background: radial-gradient(1200px 700px at 20% 15%, #1a3b8f 0%, transparent 60%),
                  radial-gradient(900px 700px at 85% 25%, #0ea5a5 0%, transparent 55%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
    }
    .wrap{max-width:1100px;margin:0 auto}
    .panel{
      background: rgba(15, 28, 52, .82);
      border:1px solid var(--stroke);
      border-radius:22px;
      padding:18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }
    h1{margin:0 0 6px;font-size:26px}
    .sub{margin:0 0 14px;color:var(--muted)}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 16px}
    .tab{
      border:1px solid var(--stroke); background: rgba(255,255,255,.06);
      color:var(--text); padding:10px 14px; border-radius:16px;
      cursor:pointer; font-weight:800;
    }
    .tab.active{background: rgba(59,130,246,.85); border-color: transparent;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:900px){.row{grid-template-columns:1fr}}
    .box{background: rgba(255,255,255,.04); border:1px solid var(--stroke); border-radius:18px; padding:16px}
    .kv{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .kv:last-child{border-bottom:none}
    .k{color:var(--muted);font-weight:700}
    .v{font-weight:900;text-align:right}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app" class="panel">Yükleniyor…</div>
  </div>

  <script defer src="./app.js"></script>
</body>
</html>
